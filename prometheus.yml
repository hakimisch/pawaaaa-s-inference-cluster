# Prometheus configuration for LLM cluster monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["{{HOMELAB_IP}}:9100"]

  - job_name: "ollama"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["{{COMPUTE_IP}}:11434"]

  - job_name: "vllm"
    static_configs:
      - targets: ["{{COMPUTE_IP}}:8000"]
